<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1050" role="img" aria-labelledby="title desc">
  <title id="title">Industrial electrical panel and automation control room</title>
  <desc id="desc">A premium blue toned scene with electrical panels, energy lines and automation indicators.</desc>
  <defs>
